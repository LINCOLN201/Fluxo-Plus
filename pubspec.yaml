name: fluxo_plus
description: Finanças pessoais modernas, seguras e offline-first.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.5.0
  package_info_plus: ^10.2.0
  path: ^1.9.1
  path_provider: ^2.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.6
  url_launcher: ^6.3.2
  supabase_flutter: ^2.15.0
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Variable.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/fluxo_plus_monochrome.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/icon/fluxo_plus_monochrome.png
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: assets/icon/fluxo_plus_monochrome.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/icon/fluxo_plus_monochrome.png
