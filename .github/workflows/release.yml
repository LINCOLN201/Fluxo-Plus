name: Publicar versão

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  verify-main:
    name: Confirmar tag na main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verificar origem da versão
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "A tag não pertence à branch main. Publicação bloqueada."
            exit 1
          fi

  android:
    name: APK Android
    needs: verify-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Configurar assinatura Android
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Secret ANDROID_KEYSTORE_BASE64 ausente" && exit 1)
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
      - name: Gerar APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          flutter build apk --release \
            --build-name="$VERSION" \
            --build-number="${{ github.run_number }}" \
            --dart-define=UPDATE_REPOSITORY=${{ github.repository }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      - name: Nomear artefato
        run: cp build/app/outputs/flutter-apk/app-release.apk fluxo-plus-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: fluxo-plus-android
          path: fluxo-plus-android.apk

  windows:
    name: Windows
    needs: verify-main
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Gerar aplicativo Windows
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          flutter build windows --release `
            --build-name="$version" `
            --build-number="${{ github.run_number }}" `
            --dart-define=UPDATE_REPOSITORY=${{ github.repository }} `
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} `
            --dart-define=SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      - name: Compactar distribuição
        shell: pwsh
        run: >
          Compress-Archive
          -Path build/windows/x64/runner/Release/*
          -DestinationPath fluxo-plus-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: fluxo-plus-windows
          path: fluxo-plus-windows.zip

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            fluxo-plus-android.apk
            fluxo-plus-windows.zip
